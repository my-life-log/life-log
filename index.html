<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>打卡小軟體｜專案日誌</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2d3748" />
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #fff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --danger: #dc2626;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px 12px 48px;
    }

    .app { max-width: 960px; margin: 0 auto; display: grid; gap: 16px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04);
    }

    h1 { margin: 0 0 8px; font-size: 1.6rem; }
    h2 { margin: 0 0 12px; font-size: 1.2rem; }
    p { margin: 0; color: var(--muted); }

    .grid { display: grid; gap: 12px; }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }

    label { display: block; font-size: 0.9rem; margin-bottom: 4px; font-weight: 600; }
    input, select, textarea, button {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 10px;
      font-size: 0.95rem;
      font-family: inherit;
    }

    textarea { min-height: 80px; resize: vertical; }
    button {
      border: none;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .project-list, .log-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }

    .project-item, .log-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #fff;
    }

    .project-head, .log-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .badge {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 999px;
      color: #fff;
      background: #64748b;
      white-space: nowrap;
    }

    .muted { color: var(--muted); font-size: 0.86rem; }
    .danger { background: var(--danger); }
    .inline-btn { width: auto; padding: 6px 10px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>🗓️ 打卡小軟體（專案版）</h1>
      <p>建立「遊戲 / 事件」專案，然後每天打卡：今天做了什麼、花多少時間，一目了然。</p>
    </section>

    <section class="card">
      <h2>建立專案</h2>
      <form id="projectForm" class="grid grid-2">
        <div>
          <label for="projectName">專案名稱</label>
          <input id="projectName" placeholder="例如：艾爾登法環、Side Project" required />
        </div>
        <div>
          <label for="projectType">類型</label>
          <select id="projectType">
            <option value="遊戲">遊戲</option>
            <option value="事件">事件</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div>
          <label for="projectColor">標籤顏色</label>
          <input id="projectColor" type="color" value="#2563eb" />
        </div>
        <div style="display:flex; align-items:end;">
          <button type="submit">新增專案</button>
        </div>
      </form>
      <ul id="projectList" class="project-list" style="margin-top:12px;"></ul>
    </section>

    <section class="card">
      <h2>每日打卡</h2>
      <form id="logForm" class="grid">
        <div class="grid grid-2">
          <div>
            <label for="logDate">日期</label>
            <input id="logDate" type="date" required />
          </div>
          <div>
            <label for="logProjectId">專案</label>
            <select id="logProjectId" required></select>
          </div>
        </div>
        <div>
          <label for="logContent">今天做了什麼？</label>
          <textarea id="logContent" placeholder="例如：跑主線、整理活動流程、做 UI 畫面..." required></textarea>
        </div>
        <div class="grid grid-2">
          <div>
            <label for="logDuration">投入時間（分鐘）</label>
            <input id="logDuration" type="number" min="0" placeholder="90" />
          </div>
          <div>
            <label for="logMood">狀態</label>
            <select id="logMood">
              <option value="順利">順利</option>
              <option value="普通">普通</option>
              <option value="卡關">卡關</option>
            </select>
          </div>
        </div>
        <button type="submit">儲存打卡</button>
      </form>
    </section>

    <section class="card">
      <h2>打卡紀錄</h2>
      <div class="grid grid-2" style="margin-bottom:12px;">
        <select id="filterProject"></select>
        <button class="secondary" id="clearDataBtn" type="button">清除所有資料</button>
      </div>
      <ul id="logList" class="log-list"></ul>
    </section>
  </main>

  <script>
    const KEY = 'daily_checkin_v1';
    const state = JSON.parse(localStorage.getItem(KEY)) || { projects: [], logs: [] };

    const $ = (id) => document.getElementById(id);
    const projectForm = $('projectForm');
    const logForm = $('logForm');
    const projectList = $('projectList');
    const logList = $('logList');

    $('logDate').value = new Date().toISOString().slice(0, 10);

    function saveState() {
      localStorage.setItem(KEY, JSON.stringify(state));
    }

    function getProjectById(id) {
      return state.projects.find((p) => p.id === id);
    }

    function populateProjectOptions() {
      const options = state.projects
        .map((p) => `<option value="${p.id}">${p.name}（${p.type}）</option>`)
        .join('');

      $('logProjectId').innerHTML = options || '<option value="">請先建立專案</option>';
      $('filterProject').innerHTML = '<option value="all">全部專案</option>' + options;
    }

    function renderProjects() {
      if (!state.projects.length) {
        projectList.innerHTML = '<li class="muted">還沒有專案，先建立一個吧。</li>';
        return;
      }

      const html = state.projects.map((project) => {
        const logs = state.logs.filter((l) => l.projectId === project.id);
        const totalMinutes = logs.reduce((sum, l) => sum + (Number(l.duration) || 0), 0);
        const lastDate = logs[0]?.date || '尚未打卡';

        return `
          <li class="project-item">
            <div class="project-head">
              <strong>${project.name}</strong>
              <span class="badge" style="background:${project.color}">${project.type}</span>
            </div>
            <div class="muted">已打卡 ${logs.length} 天，累積 ${totalMinutes} 分鐘</div>
            <div class="muted">最近紀錄：${lastDate}</div>
            <button class="danger inline-btn" onclick="removeProject('${project.id}')">刪除專案</button>
          </li>
        `;
      }).join('');

      projectList.innerHTML = html;
    }

    function renderLogs() {
      const filter = $('filterProject').value || 'all';
      const logs = [...state.logs]
        .filter((l) => filter === 'all' || l.projectId === filter)
        .sort((a, b) => b.date.localeCompare(a.date) || b.createdAt - a.createdAt);

      if (!logs.length) {
        logList.innerHTML = '<li class="muted">目前沒有打卡紀錄。</li>';
        return;
      }

      logList.innerHTML = logs.map((log) => {
        const project = getProjectById(log.projectId);
        return `
          <li class="log-item">
            <div class="log-head">
              <strong>${log.date}・${project ? project.name : '已刪除專案'}</strong>
              <span class="badge" style="background:${project?.color || '#64748b'}">${log.mood}</span>
            </div>
            <div>${log.content}</div>
            <div class="muted">投入 ${log.duration || 0} 分鐘</div>
          </li>
        `;
      }).join('');
    }

    function renderAll() {
      populateProjectOptions();
      renderProjects();
      renderLogs();
    }

    function createId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    projectForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const project = {
        id: createId(),
        name: $('projectName').value.trim(),
        type: $('projectType').value,
        color: $('projectColor').value
      };

      if (!project.name) return;
      state.projects.unshift(project);
      saveState();
      projectForm.reset();
      $('projectColor').value = '#2563eb';
      renderAll();
    });

    logForm.addEventListener('submit', (e) => {
      e.preventDefault();
      if (!state.projects.length) {
        alert('請先建立專案。');
        return;
      }

      const log = {
        id: createId(),
        projectId: $('logProjectId').value,
        date: $('logDate').value,
        content: $('logContent').value.trim(),
        duration: $('logDuration').value,
        mood: $('logMood').value,
        createdAt: Date.now()
      };

      if (!log.projectId || !log.date || !log.content) return;
      state.logs.push(log);
      saveState();
      logForm.reset();
      $('logDate').value = new Date().toISOString().slice(0, 10);
      renderAll();
    });

    $('filterProject').addEventListener('change', renderLogs);

    $('clearDataBtn').addEventListener('click', () => {
      if (!confirm('確定要清除所有專案與打卡資料嗎？')) return;
      state.projects = [];
      state.logs = [];
      saveState();
      renderAll();
    });

    window.removeProject = (projectId) => {
      if (!confirm('刪除專案後，該專案的打卡紀錄也會被刪除。確定嗎？')) return;
      state.projects = state.projects.filter((p) => p.id !== projectId);
      state.logs = state.logs.filter((l) => l.projectId !== projectId);
      saveState();
      renderAll();
    };

    renderAll();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js'));
    }
  </script>
</body>
</html>
